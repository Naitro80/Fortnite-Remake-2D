<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Royale - Build & Shoot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #87CEEB;
            font-family: 'Arial', sans-serif;
            cursor: crosshair;
        }
        
        #gameCanvas {
            display: block;
            background: linear-gradient(to bottom, #87CEEB 0%, #98D8C8 50%, #90EE90 50%, #228B22 100%);
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        
        #crosshair::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
        }
        
        #healthBar {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 300px;
            height: 30px;
            background: rgba(0,0,0,0.5);
            border: 3px solid white;
            border-radius: 5px;
            overflow: hidden;
        }
        
        #healthFill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff6666);
            transition: width 0.2s;
        }
        
        #shieldBar {
            position: absolute;
            bottom: 65px;
            left: 30px;
            width: 300px;
            height: 20px;
            background: rgba(0,0,0,0.5);
            border: 2px solid white;
            border-radius: 5px;
            overflow: hidden;
        }
        
        #shieldFill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #4444ff, #6666ff);
            transition: width 0.2s;
        }
        
        #ammo {
            position: absolute;
            bottom: 30px;
            right: 30px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        #materials {
            position: absolute;
            bottom: 70px;
            right: 30px;
            color: white;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        #weaponSlots {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }
        
        .weaponSlot {
            width: 60px;
            height: 60px;
            background: rgba(0,0,0,0.6);
            border: 2px solid #666;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 12px;
        }
        
        .weaponSlot.active {
            border-color: #ffff00;
            background: rgba(255,255,0,0.2);
        }
        
        #buildMenu {
            position: absolute;
            bottom: 170px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        #buildMenu.visible {
            opacity: 1;
        }
        
        .buildOption {
            width: 80px;
            height: 80px;
            background: rgba(0,0,0,0.8);
            border: 3px solid white;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            cursor: pointer;
            pointer-events: all;
        }
        
        .buildOption.selected {
            border-color: #00ff00;
            background: rgba(0,255,0,0.2);
        }
        
        #minimap {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 200px;
            height: 200px;
            background: rgba(0,0,0,0.6);
            border: 3px solid white;
            border-radius: 10px;
        }
        
        #stormWarning {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4444;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
            display: none;
        }
        
        #gameOver {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            pointer-events: all;
        }
        
        #gameOver h1 {
            font-size: 72px;
            margin-bottom: 20px;
        }
        
        #gameOver button {
            padding: 15px 40px;
            font-size: 24px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        #gameOver button:hover {
            background: #45a049;
        }
        
        #instructions {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 14px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 10px;
            max-width: 300px;
        }
        
        .damageNumber {
            position: absolute;
            color: #ff4444;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
        }
        
        @keyframes floatUp {
            to {
                transform: translateY(-50px);
                opacity: 0;
            }
        }
        
        #killFeed {
            position: absolute;
            top: 100px;
            right: 20px;
            color: white;
            font-size: 16px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            text-align: right;
        }
        
        .killMessage {
            margin: 5px 0;
            opacity: 0;
            animation: fadeInOut 3s ease-in-out;
        }
        
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            10%, 90% { opacity: 1; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div id="crosshair"></div>
        
        <div id="shieldBar">
            <div id="shieldFill"></div>
        </div>
        
        <div id="healthBar">
            <div id="healthFill"></div>
        </div>
        
        <div id="ammo">30 / 90</div>
        <div id="materials">Wood: 999 | Brick: 500 | Metal: 300</div>
        
        <div id="weaponSlots">
            <div class="weaponSlot active" data-weapon="0">AR</div>
            <div class="weaponSlot" data-weapon="1">SHOTGUN</div>
            <div class="weaponSlot" data-weapon="2">SMG</div>
            <div class="weaponSlot" data-weapon="3">SNIPER</div>
            <div class="weaponSlot" data-weapon="4">PICK</div>
        </div>
        
        <div id="buildMenu">
            <div class="buildOption selected" data-build="wall">WALL<br>(Q)</div>
            <div class="buildOption" data-build="floor">FLOOR<br>(F)</div>
            <div class="buildOption" data-build="ramp">RAMP<br>(R)</div>
            <div class="buildOption" data-build="roof">ROOF<br>(T)</div>
        </div>
        
        <canvas id="minimap"></canvas>
        
        <div id="stormWarning">STORM SHRINKING!</div>
        
        <div id="gameOver">
            <h1 id="gameOverText">VICTORY ROYALE!</h1>
            <p id="gameOverStats">Kills: 0</p>
            <button onclick="location.reload()">PLAY AGAIN</button>
        </div>
        
        <div id="instructions">
            <strong>CONTROLS:</strong><br>
            WASD - Move<br>
            Mouse - Aim<br>
            Click - Shoot<br>
            1-5 - Weapons<br>
            B - Build Mode<br>
            Q/F/R/T - Build Types<br>
            Space - Jump<br>
            E - Edit/Interact<br>
        </div>
        
        <div id="killFeed"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const minimap = document.getElementById('minimap');
        const minimapCtx = minimap.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        minimap.width = 200;
        minimap.height = 200;
        
        // Game state
        const game = {
            width: 3000,
            height: 3000,
            camera: { x: 0, y: 0 },
            keys: {},
            mouse: { x: 0, y: 0, down: false },
            buildMode: false,
            selectedBuild: 'wall',
            gameOver: false,
            kills: 0,
            storm: { radius: 1500, x: 1500, y: 1500, damage: 0.2 }
        };
        
        // Player - BUFFED STATS
        const player = {
            x: 1500,
            y: 1500,
            width: 30,
            height: 60,
            vx: 0,
            vy: 0,
            speed: 7, // Faster movement
            jumpPower: 15,
            grounded: false,
            health: 200, // Doubled health
            shield: 200, // Doubled shield
            maxHealth: 200,
            maxShield: 200,
            weapon: 0,
            materials: { wood: 999, brick: 500, metal: 300 },
            ammo: { ar: 30, shotgun: 5, smg: 50, sniper: 5 },
            reserveAmmo: { ar: 300, shotgun: 50, smg: 300, sniper: 25 }, // More ammo
            angle: 0,
            reloading: false,
            lastShot: 0,
            regenTimer: 0
        };
        
        // Weapons config - PLAYER BUFFED, BOTS NERFED
        const weapons = [
            { name: 'AR', damage: 35, fireRate: 120, range: 800, spread: 0.015, ammo: 'ar', automatic: true }, // More damage, faster fire
            { name: 'Shotgun', damage: 120, fireRate: 600, range: 250, spread: 0.1, ammo: 'shotgun', pellets: 5, automatic: false }, // More damage
            { name: 'SMG', damage: 20, fireRate: 60, range: 400, spread: 0.03, ammo: 'smg', automatic: true }, // More damage, faster
            { name: 'Sniper', damage: 150, fireRate: 1200, range: 1500, spread: 0, ammo: 'sniper', automatic: false }, // More damage
            { name: 'Pickaxe', damage: 35, fireRate: 300, range: 70, melee: true, automatic: false } // More damage, faster
        ];
        
        // Bot weapons - WEAKER
        const botWeapons = [
            { name: 'AR', damage: 8, fireRate: 300, range: 600, spread: 0.08 }, // Much less damage, slower, less accurate
            { name: 'SMG', damage: 5, fireRate: 150, range: 300, spread: 0.12 },
            { name: 'Pistol', damage: 6, fireRate: 400, range: 400, spread: 0.1 }
        ];
        
        // Projectiles
        let projectiles = [];
        
        // Buildings
        let buildings = [];
        
        // Bots - ONLY 3 BOTS NOW
        let bots = [];
        const BOT_COUNT = 3; // Reduced from 10 to 3
        
        // Particles
        let particles = [];
        
        // Loot
        let loot = [];
        
        // Initialize bots
        function spawnBots() {
            for (let i = 0; i < BOT_COUNT; i++) {
                bots.push({
                    x: Math.random() * game.width,
                    y: Math.random() * game.height,
                    width: 30,
                    height: 60,
                    vx: 0,
                    vy: 0,
                    speed: 2 + Math.random() * 1.5, // Slower bots
                    health: 60, // Less health
                    shield: 25, // Less shield
                    maxHealth: 60,
                    maxShield: 25,
                    angle: Math.random() * Math.PI * 2,
                    weapon: Math.floor(Math.random() * botWeapons.length),
                    lastShot: 0,
                    state: 'patrol',
                    target: null,
                    patrolX: Math.random() * game.width,
                    patrolY: Math.random() * game.height,
                    color: `hsl(${Math.random() * 360}, 70%, 50%)`,
                    name: `Bot ${i + 1}`,
                    kills: 0,
                    materials: { wood: 100, brick: 50, metal: 25 },
                    ammo: { ar: 20, smg: 30, pistol: 15 },
                    building: false,
                    buildCooldown: 0,
                    reactionTime: 30 + Math.random() * 30 // Slower reaction
                });
            }
        }
        
        // Input handling
        window.addEventListener('keydown', (e) => {
            game.keys[e.key.toLowerCase()] = true;
            
            if (e.key >= '1' && e.key <= '5') {
                player.weapon = parseInt(e.key) - 1;
                updateWeaponUI();
            }
            
            if (e.key.toLowerCase() === 'b') {
                game.buildMode = !game.buildMode;
                document.getElementById('buildMenu').classList.toggle('visible', game.buildMode);
            }
            
            if (game.buildMode) {
                switch(e.key.toLowerCase()) {
                    case 'q': game.selectedBuild = 'wall'; break;
                    case 'f': game.selectedBuild = 'floor'; break;
                    case 'r': game.selectedBuild = 'ramp'; break;
                    case 't': game.selectedBuild = 'roof'; break;
                }
                updateBuildUI();
            }
            
            if (e.key === ' ') {
                if (player.grounded) {
                    player.vy = -player.jumpPower;
                    player.grounded = false;
                }
            }
        });
        
        window.addEventListener('keyup', (e) => {
            game.keys[e.key.toLowerCase()] = false;
        });
        
        window.addEventListener('mousemove', (e) => {
            game.mouse.x = e.clientX;
            game.mouse.y = e.clientY;
        });
        
        window.addEventListener('mousedown', () => {
            game.mouse.down = true;
            shoot();
        });
        
        window.addEventListener('mouseup', () => {
            game.mouse.down = false;
        });
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        // Building system - STRONGER BUILDINGS
        function build() {
            if (!game.buildMode) return;
            
            const material = 'wood';
            if (player.materials[material] < 10) return;
            
            const mouseWorldX = game.mouse.x + game.camera.x;
            const mouseWorldY = game.mouse.y + game.camera.y;
            
            let buildX = Math.floor(mouseWorldX / 40) * 40;
            let buildY = Math.floor(mouseWorldY / 40) * 40;
            
            // Check if space is clear
            const existing = buildings.find(b => b.x === buildX && b.y === buildY);
            if (existing) return;
            
            player.materials[material] -= 10;
            
            const building = {
                x: buildX,
                y: buildY,
                width: 40,
                height: 40,
                type: game.selectedBuild,
                health: 400, // Much stronger buildings
                maxHealth: 400,
                material: material
            };
            
            if (game.selectedBuild === 'wall') {
                building.height = 120;
                building.y -= 80;
            } else if (game.selectedBuild === 'ramp') {
                building.width = 80;
                building.height = 80;
            }
            
            buildings.push(building);
            updateMaterialsUI();
        }
        
        // Shooting system
        function shoot() {
            if (player.reloading || game.gameOver) return;
            
            const weapon = weapons[player.weapon];
            const now = Date.now();
            
            if (now - player.lastShot < weapon.fireRate) return;
            if (!weapon.melee && player.ammo[weapon.ammo] <= 0) {
                reload();
                return;
            }
            
            player.lastShot = now;
            
            if (!weapon.melee) {
                player.ammo[weapon.ammo]--;
                updateAmmoUI();
            }
            
            const angle = Math.atan2(game.mouse.y - canvas.height/2, game.mouse.x - canvas.width/2);
            
            if (weapon.melee) {
                // Melee attack
                const meleeRange = weapon.range;
                const hitX = player.x + Math.cos(angle) * meleeRange;
                const hitY = player.y + Math.sin(angle) * meleeRange;
                
                // Check bot hits
                bots.forEach(bot => {
                    const dist = Math.hypot(bot.x - hitX, bot.y - hitY);
                    if (dist < 40) {
                        damageBot(bot, weapon.damage);
                    }
                });
                
                // Check building hits
                buildings.forEach(building => {
                    if (pointInRect(hitX, hitY, building)) {
                        building.health -= weapon.damage;
                        createParticles(building.x + building.width/2, building.y + building.height/2, '#8B4513', 5);
                    }
                });
            } else {
                // Ranged attack
                const pelletCount = weapon.pellets || 1;
                
                for (let i = 0; i < pelletCount; i++) {
                    const spread = (Math.random() - 0.5) * weapon.spread;
                    const pelletAngle = angle + spread;
                    
                    projectiles.push({
                        x: player.x,
                        y: player.y,
                        vx: Math.cos(pelletAngle) * 20,
                        vy: Math.sin(pelletAngle) * 20,
                        damage: weapon.damage / pelletCount,
                        owner: 'player',
                        range: weapon.range,
                        traveled: 0
                    });
                }
            }
        }
        
        function reload() {
            if (player.reloading) return;
            player.reloading = true;
            setTimeout(() => {
                const weapon = weapons[player.weapon];
                const needed = 30 - player.ammo[weapon.ammo];
                const available = player.reserveAmmo[weapon.ammo];
                const toLoad = Math.min(needed, available);
                
                player.ammo[weapon.ammo] += toLoad;
                player.reserveAmmo[weapon.ammo] -= toLoad;
                player.reloading = false;
                updateAmmoUI();
            }, 1500); // Faster reload
        }
        
        // Bot AI - EASIER
        function updateBots() {
            bots.forEach((bot, index) => {
                if (bot.health <= 0) return;
                
                const distToPlayer = Math.hypot(player.x - bot.x, player.y - bot.y);
                
                // Shorter detection range
                if (distToPlayer < 400 && player.health > 0) { // Reduced from 600
                    bot.state = 'combat';
                    bot.target = player;
                } else if (bot.state === 'combat' && distToPlayer > 600) {
                    bot.state = 'patrol';
                    bot.target = null;
                }
                
                if (bot.state === 'combat') {
                    // Slower reaction
                    if (bot.reactionTime > 0) {
                        bot.reactionTime--;
                        return;
                    }
                    
                    const angleToPlayer = Math.atan2(player.y - bot.y, player.x - bot.x);
                    bot.angle = angleToPlayer;
                    
                    // Slower, more predictable movement
                    if (distToPlayer > 350) {
                        bot.vx += Math.cos(angleToPlayer) * 0.3; // Slower
                        bot.vy += Math.sin(angleToPlayer) * 0.3;
                    } else if (distToPlayer < 200) {
                        bot.vx -= Math.cos(angleToPlayer) * 0.3;
                        bot.vy -= Math.sin(angleToPlayer) * 0.3;
                    }
                    
                    // Less strafing
                    if (Math.random() < 0.3) { // Only strafe sometimes
                        bot.vx += Math.cos(angleToPlayer + Math.PI/2) * 0.2;
                    }
                    
                    // Shoot with nerfed weapon stats
                    const weapon = botWeapons[bot.weapon];
                    const now = Date.now();
                    if (now - bot.lastShot > weapon.fireRate && bot.ammo[weapon.ammo] > 0) {
                        bot.lastShot = now;
                        bot.ammo[weapon.ammo]--;
                        
                        // Much worse accuracy
                        const accuracy = 0.4 + Math.random() * 0.3; // 40-70% accuracy
                        const spread = (Math.random() - 0.5) * weapon.spread * 3; // More spread
                        const shootAngle = angleToPlayer + spread;
                        
                        projectiles.push({
                            x: bot.x,
                            y: bot.y,
                            vx: Math.cos(shootAngle) * 15 * accuracy, // Slower bullets
                            vy: Math.sin(shootAngle) * 15 * accuracy,
                            damage: weapon.damage, // Low damage
                            owner: 'bot',
                            botIndex: index,
                            range: weapon.range,
                            traveled: 0
                        });
                    }
                    
                    // Rarely build
                    if (bot.buildCooldown <= 0 && Math.random() < 0.005) { // Much rarer
                        bot.buildCooldown = 200;
                        const buildX = Math.floor(bot.x / 40) * 40;
                        const buildY = Math.floor((bot.y - 40) / 40) * 40;
                        if (!buildings.find(b => b.x === buildX && b.y === buildY)) {
                            buildings.push({
                                x: buildX,
                                y: buildY,
                                width: 40,
                                height: 120,
                                type: 'wall',
                                health: 100, // Weaker buildings
                                maxHealth: 100,
                                material: 'wood'
                            });
                        }
                    }
                } else {
                    // Patrol
                    const distToPatrol = Math.hypot(bot.patrolX - bot.x, bot.patrolY - bot.y);
                    if (distToPatrol < 50) {
                        bot.patrolX = Math.random() * game.width;
                        bot.patrolY = Math.random() * game.height;
                    }
                    
                    const angleToPatrol = Math.atan2(bot.patrolY - bot.y, bot.patrolX - bot.x);
                    bot.vx += Math.cos(angleToPatrol) * 0.2; // Slower patrol
                    bot.vy += Math.sin(angleToPatrol) * 0.2;
                    bot.angle = angleToPatrol;
                }
                
                // Physics
                bot.vx *= 0.92; // More friction = slower
                bot.vy *= 0.92;
                bot.x += bot.vx;
                bot.y += bot.vy;
                
                // Bounds
                bot.x = Math.max(0, Math.min(game.width, bot.x));
                bot.y = Math.max(0, Math.min(game.height, bot.y));
                
                if (bot.buildCooldown > 0) bot.buildCooldown--;
            });
        }
        
        function damageBot(bot, damage) {
            if (bot.shield > 0) {
                bot.shield -= damage;
                if (bot.shield < 0) {
                    bot.health += bot.shield;
                    bot.shield = 0;
                }
            } else {
                bot.health -= damage;
            }
            
            showDamageNumber(damage, bot.x, bot.y);
            
            if (bot.health <= 0) {
                game.kills++;
                addKillFeed(`You eliminated ${bot.name}`);
                
                // Drop loot
                loot.push({
                    x: bot.x,
                    y: bot.y,
                    type: 'ammo',
                    weapon: bot.weapon,
                    amount: Math.floor(Math.random() * 30) + 10
                });
                
                // Heal player on kill
                player.health = Math.min(player.maxHealth, player.health + 25);
                player.shield = Math.min(player.maxShield, player.shield + 15);
                updateHealthUI();
            }
        }
        
        function damagePlayer(damage) {
            if (player.shield > 0) {
                player.shield -= damage;
                if (player.shield < 0) {
                    player.health += player.shield;
                    player.shield = 0;
                }
            } else {
                player.health -= damage;
            }
            
            player.regenTimer = 300; // 5 seconds before regen
            
            updateHealthUI();
            
            if (player.health <= 0 && !game.gameOver) {
                gameOver(false);
            }
        }
        
        // Health regeneration
        function updateRegen() {
            if (player.regenTimer > 0) {
                player.regenTimer--;
            } else {
                // Slow regeneration
                if (player.shield < player.maxShield) {
                    player.shield = Math.min(player.maxShield, player.shield + 0.1);
                } else if (player.health < player.maxHealth) {
                    player.health = Math.min(player.maxHealth, player.health + 0.05);
                }
                updateHealthUI();
            }
        }
        
        // Update projectiles
        function updateProjectiles() {
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.traveled += Math.hypot(p.vx, p.vy);
                
                if (p.traveled > p.range) {
                    projectiles.splice(i, 1);
                    continue;
                }
                
                // Check building collisions
                let hit = false;
                for (let j = buildings.length - 1; j >= 0; j--) {
                    const b = buildings[j];
                    if (pointInRect(p.x, p.y, b)) {
                        b.health -= p.damage;
                        createParticles(p.x, p.y, '#8B4513', 3);
                        hit = true;
                        
                        if (b.health <= 0) {
                            buildings.splice(j, 1);
                            createParticles(b.x + b.width/2, b.y + b.height/2, b.material === 'wood' ? '#8B4513' : '#808080', 10);
                        }
                        break;
                    }
                }
                
                if (hit) {
                    projectiles.splice(i, 1);
                    continue;
                }
                
                // Check entity collisions
                if (p.owner === 'player') {
                    bots.forEach(bot => {
                        if (bot.health > 0 && Math.hypot(bot.x - p.x, bot.y - p.y) < 20) {
                            damageBot(bot, p.damage);
                            projectiles.splice(i, 1);
                            hit = true;
                        }
                    });
                } else if (p.owner === 'bot') {
                    if (Math.hypot(player.x - p.x, player.y - p.y) < 20) {
                        damagePlayer(p.damage);
                        projectiles.splice(i, 1);
                        hit = true;
                    }
                }
                
                if (!hit && (p.x < 0 || p.x > game.width || p.y < 0 || p.y > game.height)) {
                    projectiles.splice(i, 1);
                }
            }
        }
        
        // Physics
        function updatePhysics() {
            // Player movement
            if (game.keys['w']) player.vy -= 1;
            if (game.keys['s']) player.vy += 1;
            if (game.keys['a']) player.vx -= 1;
            if (game.keys['d']) player.vx += 1;
            
            player.vx *= 0.85;
            player.vy *= 0.85;
            
            // Building collision for player
            let newX = player.x + player.vx * player.speed;
            let newY = player.y + player.vy * player.speed;
            
            if (!buildings.some(b => rectIntersect(newX - 15, player.y - 30, 30, 60, b.x, b.y, b.width, b.height))) {
                player.x = newX;
            }
            if (!buildings.some(b => rectIntersect(player.x - 15, newY - 30, 30, 60, b.x, b.y, b.width, b.height))) {
                player.y = newY;
            }
            
            // Bounds
            player.x = Math.max(15, Math.min(game.width - 15, player.x));
            player.y = Math.max(30, Math.min(game.height - 30, player.y));
            
            // Camera follow
            game.camera.x = player.x - canvas.width / 2;
            game.camera.y = player.y - canvas.height / 2;
            
            // Player angle
            player.angle = Math.atan2(game.mouse.y - canvas.height/2, game.mouse.x - canvas.width/2);
            
            // Storm damage - SLOWER
            const distToStorm = Math.hypot(player.x - game.storm.x, player.y - game.storm.y);
            if (distToStorm > game.storm.radius) {
                damagePlayer(0.1); // Much slower storm damage
            }
        }
        
        // Particles
        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 30,
                    color: color
                });
            }
        }
        
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.5;
                p.life--;
                
                if (p.life <= 0) particles.splice(i, 1);
            }
        }
        
        // Rendering
        function draw() {
            // Clear
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            ctx.translate(-game.camera.x, -game.camera.y);
            
            // Draw ground
            ctx.fillStyle = '#90EE90';
            ctx.fillRect(0, 0, game.width, game.height);
            
            // Draw grid
            ctx.strokeStyle = 'rgba(0,0,0,0.1)';
            ctx.lineWidth = 1;
            for (let x = 0; x <= game.width; x += 100) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, game.height);
                ctx.stroke();
            }
            for (let y = 0; y <= game.height; y += 100) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(game.width, y);
                ctx.stroke();
            }
            
            // Draw storm
            ctx.fillStyle = 'rgba(128, 0, 128, 0.3)';
            ctx.beginPath();
            ctx.arc(game.storm.x, game.storm.y, game.storm.radius + 1000, 0, Math.PI * 2);
            ctx.arc(game.storm.x, game.storm.y, game.storm.radius, 0, Math.PI * 2, true);
            ctx.fill();
            
            // Draw buildings
            buildings.forEach(b => {
                const healthPct = b.health / b.maxHealth;
                ctx.fillStyle = b.material === 'wood' ? `rgb(${139 * healthPct + 100}, ${69 * healthPct + 100}, ${19 * healthPct + 50})` : 
                               b.material === 'brick' ? `rgb(${128 * healthPct + 100}, ${128 * healthPct + 100}, ${128 * healthPct + 100})` :
                               `rgb(${100 * healthPct + 100}, ${100 * healthPct + 100}, ${150 * healthPct + 100})`;
                ctx.fillRect(b.x, b.y, b.width, b.height);
                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.strokeRect(b.x, b.y, b.width, b.height);
            });
            
            // Draw loot
            loot.forEach(l => {
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(l.x, l.y, 10, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'black';
                ctx.font = '12px Arial';
                ctx.fillText(l.type, l.x - 15, l.y - 15);
            });
            
            // Draw bots
            bots.forEach(bot => {
                if (bot.health <= 0) return;
                
                ctx.save();
                ctx.translate(bot.x, bot.y);
                
                // Body
                ctx.fillStyle = bot.color;
                ctx.fillRect(-15, -30, 30, 60);
                
                // Health bar
                ctx.fillStyle = 'red';
                ctx.fillRect(-20, -45, 40, 5);
                ctx.fillStyle = 'green';
                ctx.fillRect(-20, -45, 40 * (bot.health / bot.maxHealth), 5);
                
                // Gun
                ctx.rotate(bot.angle);
                ctx.fillStyle = '#333';
                ctx.fillRect(10, -5, 30, 10);
                
                ctx.restore();
                
                // Name
                ctx.fillStyle = 'white';
                ctx.font = '12px Arial';
                ctx.fillText(bot.name, bot.x - 20, bot.y - 50);
            });
            
            // Draw player
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // Body
            ctx.fillStyle = '#4169E1';
            ctx.fillRect(-15, -30, 30, 60);
            
            // Gun
            ctx.rotate(player.angle);
            const weapon = weapons[player.weapon];
            ctx.fillStyle = '#222';
            if (weapon.melee) {
                ctx.fillRect(10, -3, 25, 6);
                ctx.fillRect(30, -8, 8, 16);
            } else {
                ctx.fillRect(10, -4, 35, 8);
            }
            
            ctx.restore();
            
            // Draw projectiles
            ctx.fillStyle = '#FFD700';
            projectiles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Draw particles
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 30;
                ctx.fillRect(p.x - 3, p.y - 3, 6, 6);
            });
            ctx.globalAlpha = 1;
            
            // Build preview
            if (game.buildMode) {
                const mouseWorldX = game.mouse.x + game.camera.x;
                const mouseWorldY = game.mouse.y + game.camera.y;
                const buildX = Math.floor(mouseWorldX / 40) * 40;
                const buildY = Math.floor(mouseWorldY / 40) * 40;
                
                ctx.fillStyle = 'rgba(0, 255, 0, 0.3)';
                if (game.selectedBuild === 'wall') {
                    ctx.fillRect(buildX, buildY - 80, 40, 120);
                } else if (game.selectedBuild === 'floor') {
                    ctx.fillRect(buildX, buildY, 40, 40);
                } else if (game.selectedBuild === 'ramp') {
                    ctx.fillRect(buildX, buildY, 80, 80);
                }
            }
            
            ctx.restore();
            
            // Minimap
            drawMinimap();
        }
        
        function drawMinimap() {
            minimapCtx.fillStyle = 'rgba(0,0,0,0.8)';
            minimapCtx.fillRect(0, 0, 200, 200);
            
            const scale = 200 / game.width;
            
            // Storm
            minimapCtx.fillStyle = 'purple';
            minimapCtx.beginPath();
            minimapCtx.arc(game.storm.x * scale, game.storm.y * scale, game.storm.radius * scale, 0, Math.PI * 2);
            minimapCtx.fill();
            
            // Ground
            minimapCtx.fillStyle = '#228B22';
            minimapCtx.fillRect(0, 0, 200, 200);
            
            // Storm overlay
            minimapCtx.fillStyle = 'rgba(128, 0, 128, 0.5)';
            minimapCtx.beginPath();
            minimapCtx.arc(game.storm.x * scale, game.storm.y * scale, game.storm.radius * scale, 0, Math.PI * 2);
            minimapCtx.fill();
            
            // Player
            minimapCtx.fillStyle = 'blue';
            minimapCtx.fillRect(player.x * scale - 3, player.y * scale - 3, 6, 6);
            
            // Bots
            minimapCtx.fillStyle = 'red';
            bots.forEach(bot => {
                if (bot.health > 0) {
                    minimapCtx.fillRect(bot.x * scale - 2, bot.y * scale - 2, 4, 4);
                }
            });
        }
        
        // UI Updates
        function updateHealthUI() {
            document.getElementById('healthFill').style.width = (Math.max(0, player.health) / player.maxHealth * 100) + '%';
            document.getElementById('shieldFill').style.width = (Math.max(0, player.shield) / player.maxShield * 100) + '%';
        }
        
        function updateAmmoUI() {
            const weapon = weapons[player.weapon];
            if (weapon.melee) {
                document.getElementById('ammo').textContent = '∞';
            } else {
                document.getElementById('ammo').textContent = `${player.ammo[weapon.ammo]} / ${player.reserveAmmo[weapon.ammo]}`;
            }
        }
        
        function updateMaterialsUI() {
            document.getElementById('materials').textContent = 
                `Wood: ${player.materials.wood} | Brick: ${player.materials.brick} | Metal: ${player.materials.metal}`;
        }
        
        function updateWeaponUI() {
            document.querySelectorAll('.weaponSlot').forEach((slot, i) => {
                slot.classList.toggle('active', i === player.weapon);
            });
            updateAmmoUI();
        }
        
        function updateBuildUI() {
            document.querySelectorAll('.buildOption').forEach(opt => {
                opt.classList.toggle('selected', opt.dataset.build === game.selectedBuild);
            });
        }
        
        function showDamageNumber(damage, x, y) {
            const el = document.createElement('div');
            el.className = 'damageNumber';
            el.textContent = Math.floor(damage);
            el.style.left = (x - game.camera.x) + 'px';
            el.style.top = (y - game.camera.y - 50) + 'px';
            document.getElementById('ui').appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }
        
        function addKillFeed(message) {
            const feed = document.getElementById('killFeed');
            const msg = document.createElement('div');
            msg.className = 'killMessage';
            msg.textContent = message;
            feed.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }
        
        function gameOver(victory) {
            game.gameOver = true;
            document.getElementById('gameOver').style.display = 'flex';
            document.getElementById('gameOverText').textContent = victory ? 'VICTORY ROYALE!' : 'GAME OVER';
            document.getElementById('gameOverStats').textContent = `Kills: ${game.kills}`;
        }
        
        // Utilities
        function pointInRect(x, y, rect) {
            return x >= rect.x && x <= rect.x + rect.width &&
                   y >= rect.y && y <= rect.y + rect.height;
        }
        
        function rectIntersect(x1, y1, w1, h1, x2, y2, w2, h2) {
            return x1 < x2 + w2 && x1 + w1 > x2 &&
                   y1 < y2 + h2 && y1 + h1 > y2;
        }
        
        // Game loop
        function gameLoop() {
            if (!game.gameOver) {
                updatePhysics();
                updateBots();
                updateProjectiles();
                updateParticles();
                updateRegen(); // Health regeneration
                
                // Auto fire for automatic weapons
                if (game.mouse.down && weapons[player.weapon].automatic) {
                    shoot();
                }
                
                // Check win condition
                const aliveBots = bots.filter(b => b.health > 0).length;
                if (aliveBots === 0) {
                    gameOver(true);
                }
                
                // Shrink storm - SLOWER
                if (game.storm.radius > 400) { // Stops at larger radius
                    game.storm.radius -= 0.02; // Much slower
                }
            }
            
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // Click to build
        canvas.addEventListener('click', (e) => {
            if (game.buildMode) {
                build();
            }
        });
        
        // Build menu clicks
        document.querySelectorAll('.buildOption').forEach(opt => {
            opt.addEventListener('click', () => {
                game.selectedBuild = opt.dataset.build;
                updateBuildUI();
            });
        });
        
        // Initialize
        spawnBots();
        updateHealthUI();
        updateAmmoUI();
        gameLoop();
    </script>
</body>
